name: Daily Digest Trigger

on:
  schedule:
    - cron: "10 12 * * *"
  workflow_dispatch:

jobs:
  trigger-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Call WorkflowHub API
        run: |
          curl --fail -X POST \
          "https://workflowhub.onrender.com/api/system/daily-digest" \
          -H "x-api-key: ${{ secrets.DIGEST_API_KEY }}"
